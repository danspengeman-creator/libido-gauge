// PIN logic
let pinEntry = "";
function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 4) {
    if (pinEntry === CORRECT_PIN) {
      sessionStorage.setItem("unlocked","1");
      document.getElementById("pin-overlay").style.display = "none";
      init();
    } else {
      const dots = document.getElementById("pin-dots");
      dots.style.animation = "shake 0.4s ease";
      document.getElementById("pin-error").textContent = "Incorrect PIN. Try again.";
      setTimeout(() => { dots.style.animation = ""; pinEntry = ""; updatePinDots(); }, 400);
    }
  }
}
function pinDel() {
  pinEntry = pinEntry.slice(0,-1);
  updatePinDots();
  document.getElementById("pin-error").textContent = "";
}
function updatePinDots() {
  for (let i=0; i<4; i++) document.getElementById("d"+i).classList.toggle("filled", i < pinEntry.length);
}
if (sessionStorage.getItem("unlocked")==="1") {
  document.getElementById("pin-overlay").style.display = "none";

}

  "Menstrual": [
    "Focus on comfort and care. Warm gestures, low-key quality time and zero pressure go a long way right now.",

function getDailyTip(phaseName) {
  const tips = PHASE_TIPS[phaseName] || PHASE_TIPS["Luteal"];
  return tips[Math.floor(Date.now() / 86400000) % tips.length];
}

const PHASES = [
  { name:"Menstrual",   maxPct:0.18, level:1, color:"#B5D4F4", accent:"#378ADD", label:"Low",      desc:"Rest phase — energy and desire are minimal." },
  { name:"Follicular",  maxPct:0.46, level:3, color:"#9FE1CB", accent:"#1D9E75", label:"Rising",   desc:"Estrogen rising — mood and interest are climbing." },
  { name:"Ovulation",   maxPct:0.57, level:5, color:"#F0997B", accent:"#D85A30", label:"Peak",     desc:"Ovulation window — libido is at its highest." },
  { name:"Luteal",      maxPct:0.86, level:3, color:"#FAC775", accent:"#BA7517", label:"Moderate", desc:"Post-ovulation — desire starts to ease off." },
  { name:"Late Luteal", maxPct:1.00, level:1, color:"#D3D1C7", accent:"#888780", label:"Low",      desc:"PMS phase — energy and desire are winding down." },
];

function getPhase(day, len) { return PHASES.find(p => day/len <= p.maxPct) || PHASES[4]; }
function getPhaseRange(phase, len) {
  const idx = PHASES.indexOf(phase);
  const prev = idx > 0 ? PHASES[idx-1] : null;
  const start = prev ? Math.floor(prev.maxPct * len) + 1 : 1;
  const end = Math.min(Math.floor(phase.maxPct * len), len);
  return "Days " + start + "\u2013" + end;
}
function parseISOLocal(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}
function cycleDay(last, len) {
  const diff = Math.floor((Date.now() - parseISOLocal(last).getTime()) / 86400000);
  return (diff % len) + 1;
}
function avgLen(dates) {
  if (dates.length < 2) return 28;
  const s = dates.map(d => parseISOLocal(d)).sort((a,b) => a-b);
  let t = 0; for (let i=1; i<s.length; i++) t += (s[i]-s[i-1])/86400000;
  return Math.round(t/(s.length-1));
}
function getBestDays(day, len) {
  const out = [];
  for (let o=0; o<=len && out.length<3; o++) {
    const d = ((day-1+o)%len)+1, pct = d/len;
    if (pct>0.46 && pct<=0.57) {
      const dt = new Date(); dt.setDate(dt.getDate()+o);
      out.push({ daysFrom:o, label:"Peak", dt });
    }
  }
  return out;
}
function getNextPeriod(day, len) {
  const du = len-day+1, dt = new Date(); dt.setDate(dt.getDate()+du);
  return { daysUntil:du, dateStr:dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}) };
}
function classifyDay(d, len) {
  if (d <= 5) return "period";
  const p = d/len;
  if (p<=0.46) return "rising";
  if (p<=0.57) return "peak";
  if (p<=0.86) return "neutral";
  return "low";
}
function getCycleDay(calDay, month, year, last, len) {
  const diff = Math.floor((new Date(year,month,calDay) - parseISOLocal(last)) / 86400000);
  return ((diff % len) + len) % len + 1;
}
function getDayType(calDay, month, year, last, len) {
  return classifyDay(getCycleDay(calDay, month, year, last, len), len);
}
function buildStats(dates, sexDates, len) {
  const totalCycles = dates.length;
  const sorted = [...sexDates].map(d => parseISOLocal(d)).sort((a,b) => a-b);

  // Avg days between intimacy
  let avgGap = "—";
  if (sorted.length >= 2) {
    let total = 0;
    for (let i=1; i<sorted.length; i++) total += (sorted[i]-sorted[i-1])/86400000;
    avgGap = Math.round(total/(sorted.length-1)) + "d";
  }

  // Longest gap
  let longestGap = "—";
  if (sorted.length >= 2) {
    let max = 0;
    for (let i=1; i<sorted.length; i++) max = Math.max(max, (sorted[i]-sorted[i-1])/86400000);
    longestGap = Math.round(max) + "d";
  }

  let topPhase = "—";
  if (sexDates.length && dates.length) {
    const last = dates[dates.length-1];
    const counts = {};
    sexDates.forEach(sd => {

      counts[ph.name] = (counts[ph.name]||0) + 1;

    <div class="stats-title">Stats</div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-val">${totalCycles}</div><div class="stat-lbl">Cycles logged</div></div>
      <div class="stat"><div class="stat-val">${avgGap}</div><div class="stat-lbl">Avg intimacy gap</div></div>
      <div class="stat"><div class="stat-val">${longestGap}</div><div class="stat-lbl">Longest gap</div></div>

    </div>
  </div>`;}

  return new Promise(resolve => {
    const cb = "cb_" + Date.now();
    const s = document.createElement("script");
    const t = setTimeout(() => { cleanup(); resolve({ dates: PERIOD_DATES_FB, sexDates: SEX_DATES_FB }); }, 8000);
    function cleanup() { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); clearTimeout(t); }
    window[cb] = data => {
      const dates = Array.isArray(data.dates) && data.dates.length ? data.dates : PERIOD_DATES_FB;
      const sexDates = Array.isArray(data.sexDates) ? data.sexDates : SEX_DATES_FB;
      resolve({ dates, sexDates });
      cleanup();
    };
    s.onerror = () => { cleanup(); resolve({ dates: PERIOD_DATES_FB, sexDates: SEX_DATES_FB }); };
    s.src = SCRIPT_URL + "?callback=" + cb + "&t=" + Date.now();
    document.head.appendChild(s);
  });
}
function logDate(type, isoDate) {
  return new Promise((resolve, reject) => {
    const cb = "log_" + Date.now();
    const s = document.createElement("script");
    const t = setTimeout(() => { cleanup(); reject(new Error("Timed out")); }, 8000);
    function cleanup() { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); clearTimeout(t); }
    window[cb] = data => { cleanup(); if (data.success) resolve(data); else reject(new Error(data.message)); };
    s.onerror = () => { cleanup(); reject(new Error("Script error")); };
    s.src = SCRIPT_URL + "?action=log&type=" + type + "&date=" + isoDate + "&callback=" + cb;
    document.head.appendChild(s);
  });
}

let particleCanvas, particleCtx, particleAnim;
let monthOffset = 0;
let calState = null;

function stopParticles() {
  if (particleAnim) cancelAnimationFrame(particleAnim);
  if (particleCtx && particleCanvas) particleCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
}
function startParticles(canvas, phase) {
  stopParticles(); particleCanvas=canvas; particleCtx=canvas.getContext("2d");
  canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
  const pts = Array.from({length:phase.level===5?40:20}, () => ({
    x:Math.random()*canvas.width, y:canvas.height+Math.random()*40,
    r:Math.random()*3+1, speed:Math.random()*0.8+0.3,
    opacity:Math.random()*0.5+0.2, drift:(Math.random()-0.5)*0.5
  }));
  function draw() {
    particleCtx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p => {
      particleCtx.beginPath(); particleCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      particleCtx.fillStyle = phase.accent+Math.round(p.opacity*255).toString(16).padStart(2,"0");
      particleCtx.fill();
      p.y-=p.speed; p.x+=p.drift;
      if (p.y<-10) { p.y=canvas.height+10; p.x=Math.random()*canvas.width; }
    });
    particleAnim = requestAnimationFrame(draw);
  }
  draw();
}

function showModal(isoDate) {
  const dt = parseISOLocal(isoDate);
  const existing = document.getElementById("modal-overlay");
  if (existing) existing.remove();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-date">${dt.toLocaleDateString("en-US",{month:"long",day:"numeric"})}</div>
      <div class="modal-sub">What would you like to log?</div>
      <div class="modal-btns" id="modal-btns">
        <button class="modal-btn period" onclick="handleLog('period','${isoDate}')">🌙 Period start</button>
        <button class="modal-btn sex" onclick="handleLog('sex','${isoDate}')">😊 Intimacy</button>
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>`;
  overlay.addEventListener("click", e => { if (e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  const el = document.getElementById("modal-overlay");
  if (el) el.remove();
}
async function handleLog(type, isoDate) {
  const btns = document.getElementById("modal-btns");
  if (btns) btns.innerHTML = `<div class="modal-saving">Saving...</div>`;
  try {
    await logDate(type, isoDate);
    if (btns) btns.innerHTML = `<div class="modal-success">Saved! Refreshing...</div>`;
    setTimeout(() => { closeModal(); init(); }, 2000);
  } catch(e) {
    if (btns) btns.innerHTML = `<div class="modal-error">Could not save. Try again.</div><button class="modal-btn cancel" onclick="closeModal()">Close</button>`;
  }
}

function buildCalendar(last, len, sexDates, offset) {
  const now = new Date();
  const tgtDate = new Date(now.getFullYear(), now.getMonth()+offset, 1);
  const year = tgtDate.getFullYear(), month = tgtDate.getMonth();
  const isEstimate = offset > 0;
  const monthName = tgtDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const sexSet = new Set(sexDates);

  let cells = ["Su","Mo","Tu","We","Th","Fr","Sa"].map(d => `<div class="cal-dow">${d}</div>`).join("");
  for (let i=0; i<firstDay; i++) cells += `<div></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isSex = sexSet.has(iso);
    const cycD = getCycleDay(d, month, year, last, len);
    const type = getDayType(d, month, year, last, len);
    const isLastChance = !isSex && cycD === len;
    const isToday = offset===0 && d===now.getDate();

    let cls = "cal-day";
    if (isSex) cls += " sex";
    else if (isLastChance) cls += " last-chance";
    else if (type==="period") cls += " period";
    else if (type==="rising") cls += " rising";
    else if (type==="peak") cls += " peak";
    else if (type==="low") cls += " low";
    if (isToday) cls += " today";

    let tip = "";
    if (isSex) tip = "Intimacy recorded";
    else if (isLastChance) tip = "Last chance — period starts tomorrow";
    else if (type==="period") tip = "Period day " + cycD + " of 5";
    else if (type==="rising") tip = "Rising desire — good time to initiate";
    else if (type==="peak") tip = "Peak desire — ovulation window";
    else if (type==="low") tip = "Low desire — late luteal phase";
    else tip = "Moderate — post-ovulation";

    cells += `<div class="${cls}" onclick="showModal('${iso}')" title="${tip}">${d}${isSex?`<span style="font-size:9px;position:absolute;top:1px;right:1px">😊</span>`:""}</div>`;
  }

  return `<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)" ${offset===0?"disabled":""}>&#8249;</button>
      <div class="cal-title-wrap">
        <div class="cal-title">${monthName}</div>
        ${isEstimate?`<div class="cal-estimate">estimated projection</div>`:""}
      </div>
      <button class="cal-nav" onclick="changeMonth(1)" ${offset>=6?"disabled":""}>&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-hint">Tap any date to log a period or intimacy</div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#D85A30"></div>Peak</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#1D9E7522;border:1px solid #1D9E7544"></div>Rising</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#5576D122;border:1px solid #5576D144"></div>Period</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fff8e6;border:2px solid #f0b429"></div>Last chance</div>
      <div class="cal-legend-item"><span style="font-size:12px">😊</span><span style="margin-left:3px">Intimacy</span></div>
    </div>
  </div>`;
}

function changeMonth(dir) {
  monthOffset = Math.max(0, Math.min(6, monthOffset+dir));
  if (calState) document.getElementById("calContainer").innerHTML = buildCalendar(calState.last, calState.len, calState.sexDates, monthOffset);
}

function render(dates, sexDates) {
  monthOffset = 0;
  const len = avgLen(dates);
  const last = dates[dates.length-1];
  const day = cycleDay(last, len);
  const phase = getPhase(day, len);
  const best = getBestDays(day, len);
  const next = best[0];
  const soonHot = next && next.daysFrom>0 && next.daysFrom<=3;
  const period = getNextPeriod(day, len);
  const periodSoon = period.daysUntil<=4;
  const today = new Date(); today.setHours(0,0,0,0);
  const safe = Array.isArray(sexDates) ? sexDates : [];
  const lastSex = safe.length ? parseISOLocal(safe[safe.length-1]) : null;
  const daysSince = lastSex ? Math.floor((today-lastSex)/86400000) : 999;
  const inCooldown = daysSince < 3;
  const showSmiley = daysSince <= 2;
  const lastSexStr = lastSex ? lastSex.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}) : null;
  let effLevel = phase.level; if (inCooldown) effLevel = Math.max(1, phase.level-2);
  const onPeriod = phase.name==="Menstrual";
  const todayHot = !onPeriod && effLevel>=4;
  const todayWarm = !onPeriod && effLevel===3;
  const recentOnHot = inCooldown && phase.level>=3 && !onPeriod;
  const rawDaysSincePeriod = Math.floor((today - parseISOLocal(last)) / 86400000) + 1;
  const isLastChanceDay = !onPeriod && period.daysUntil===1;
  const isOverdue = rawDaysSincePeriod > len && !onPeriod;

  calState = { last, len, sexDates: safe };

  let banner = "";
  if (isOverdue) banner = `<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#888780,#5f5e5a)"><div class="banner-pulse"></div><div class="banner-icon">📋</div><div class="banner-title">Period log overdue</div><div class="banner-sub">It's been ${rawDaysSincePeriod} days since her last period. Did she start? Tap the calendar to log it.</div></div>`;
  else if (onPeriod) banner = `<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#5576D1,#3a54a0)"><div class="banner-pulse"></div><div class="banner-icon">🌙</div><div class="banner-title">Period day ${day} of 5</div><div class="banner-sub">She's on her period. Not a good time to initiate.</div></div>`;
  else if (recentOnHot) banner = `<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#7b6fd4,#534AB7)"><div class="banner-pulse"></div><div class="banner-icon">😏</div><div class="banner-title">Recently active</div><div class="banner-sub">Cycle says high desire but you were active ${daysSince===0?"today":daysSince===1?"yesterday":daysSince+" days ago"}. Give it a couple more days.</div></div>`;
  else if (todayHot) banner = `<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#ff6b35,#d85a30)"><div class="banner-pulse"></div><div class="banner-icon">🔥</div><div class="banner-title">Tonight's the night</div><div class="banner-sub">She's at peak desire. The ovulation window is open.</div></div>`;
  else if (todayWarm) banner = `<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#2ecc9a,#1D9E75)"><div class="banner-pulse"></div><div class="banner-icon">⚡</div><div class="banner-title">Good time to initiate</div><div class="banner-sub">Desire is rising. Conditions are favorable.</div></div>`;
  else if (isLastChanceDay) banner = `<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#f0b429,#8a6000)"><div class="banner-pulse"></div><div class="banner-icon">⏰</div><div class="banner-title">Last chance tonight</div><div class="banner-sub">Her period starts tomorrow. Tonight is the last opportunity for a while.</div></div>`;

  let alerts = "";
  if (!onPeriod && !isOverdue) {
    if (soonHot && !isLastChanceDay) alerts += `<div class="alert alert-desire fadein"><div class="alert-dot" style="background:#D85A30"></div><p><strong>Heads up</strong> — a high-desire window is ${next.daysFrom===1?"tomorrow":"in "+next.daysFrom+" days"} (${next.dateStr}).</p></div>`;
    if (periodSoon && !isLastChanceDay) alerts += `<div class="alert alert-period fadein"><div class="alert-dot" style="background:#5576D1"></div><p><strong>Period approaching</strong> — expected ${period.daysUntil===1?"tomorrow":"in "+period.daysUntil+" days"} (${period.dateStr}). Desire will be low.</p></div>`;
    if (!soonHot && !periodSoon && phase.level<=1) alerts += `<div class="alert alert-period fadein"><div class="alert-dot" style="background:#888780"></div><p>Next period expected in <strong>${period.daysUntil} days</strong> (${period.dateStr}).</p></div>`;
  }

  const chipsHtml = !onPeriod && !isOverdue ? `<div class="best-card fadein">
    <div class="best-title">✦ Peak days to initiate ✦</div>
    <div class="day-chips">${best.map(({daysFrom, label, dt}) => {
      const ac = "#D85A30";
      return `<div class="chip" style="border:1px solid ${ac}${daysFrom===0?"":"55"};background:${daysFrom===0?ac+"18":"#fafaf8"}">
        <div class="chip-dow">${daysFrom===0?"Today":daysFrom===1?"Tomorrow":dt.toLocaleDateString("en-US",{weekday:"long"})}</div>
        <div class="chip-date" style="color:${ac}">${dt.getDate()}</div>
        <div class="chip-month">${dt.toLocaleDateString("en-US",{month:"short"})}</div>
        <div class="chip-label" style="background:${ac}18;color:${ac}">${label}</div>
        <div class="chip-peak-dot" style="color:${ac}">●</div>
      </div>`;
    }).join("")}</div>
  </div>` : "";

  document.getElementById("content").innerHTML = `<div class="fadein">
    <p class="desktop-sub">Live cycle tracker — updated daily</p>
    ${lastSexStr?`<div class="alert fadein" style="background:#fff0f8;border:1px solid #e8a0cc44;margin-bottom:1rem"><div class="alert-dot" style="background:#cc6699"></div><p><strong>Last intimacy${showSmiley?" 😊":""}:</strong> ${lastSexStr}${daysSince===0?" (today)":daysSince===1?" (yesterday)":" ("+daysSince+" days ago)"}</p></div>`:""}
    ${banner}
    <div class="desktop-grid">
      <div class="desktop-left">
        <div class="card fadein" id="mainCard" style="border:1px solid ${phase.accent}44">
          <canvas id="pCanvas"></canvas>
          <div style="position:relative;z-index:1">
            <div class="row">
              <div>
                <div class="day-label">Day ${day} of ${len} · ${phase.name} (${getPhaseRange(phase, len)})</div>
                <div class="level-label">${phase.label}</div>
              </div>
              <div class="orb-wrap" style="background:${phase.accent}22;border:2px solid ${phase.accent}">
                <div class="orb" style="background:${phase.accent};${phase.level>=4?"animation:pulseOrb 1.8s ease-in-out infinite":"opacity:0.6"}"></div>
              </div>
            </div>
            <div class="gauge-track"><div class="gauge-fill" id="gaugeFill" style="width:0%;background:linear-gradient(90deg,${phase.color},${phase.accent})"></div></div>
            <div class="gauge-labels"><span>Low</span><span>Rising</span><span>Peak</span></div>
            <p class="desc">${phase.desc}</p>
            <p class="phase-tip">${getDailyTip(phase.name)}</p>
            <div class="phase-strip">${PHASES.map(p=>`<div class="phase-pip" style="background:${p.name===phase.name?phase.accent:"#ebebeb"};${p.name===phase.name?"animation:pulse 2s ease-in-out infinite":""}"></div>`).join("")}</div>
          </div>
        </div>
        ${alerts}
        ${chipsHtml}
      </div>
      <div class="desktop-right"><div id="calContainer">${buildCalendar(last,len,safe,0)}</div></div>
    </div>
    <div class="footer">Avg cycle: ${len} days · <a onclick="init()">Refresh</a></div>
    ${buildStats(dates, safe, len)}
  </div>`;

  setTimeout(() => {
    const f = document.getElementById("gaugeFill");
    if (f) f.style.width = Math.max(8,((phase.level-1)/4)*100)+"%";
    if (phase.level>=3) { const c=document.getElementById("pCanvas"); if(c) startParticles(c,phase); }
  }, 100);
}

async function init() {
  stopParticles();
  document.getElementById("content").innerHTML = `<div class="loading">Reading cycle data...<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  const {dates, sexDates} = await fetchDates();
  render(dates, sexDates);
}
</script>

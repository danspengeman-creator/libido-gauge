<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Michelle Libido Gauge" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Michelle Libido Gauge</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  :root {
    --bg:#f5f5f3;--bg2:#fff;--bg3:#f0f0ee;--text:#1a1a1a;--text2:#888;--text3:#aaa;
    --border:#e5e5e5;--border2:#ddd;--card-bg:#fff;--pin-bg:#f5f5f3;--pin-btn:#fff;
    --low-bg:#f5f5f3;--low-text:#bbb;
  }
  html.dark {
    --bg:#111112;--bg2:#1c1c1e;--bg3:#2c2c2e;--text:#f2f2f7;--text2:#8e8e93;--text3:#636366;
    --border:#2c2c2e;--border2:#3a3a3c;--card-bg:#1c1c1e;--pin-bg:#111112;--pin-btn:#2c2c2e;
    --low-bg:#2c2c2e;--low-text:#636366;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background 0.3s,color 0.3s;}
  #app{width:100%;max-width:420px;margin:0 auto;padding:1.5rem 1rem 2rem;padding-top:max(1.5rem,env(safe-area-inset-top));}
  @media(min-width:768px){
    body{display:flex;flex-direction:column;align-items:center;padding:2.5rem 2rem;}
    #app{max-width:960px;width:100%;padding:0;}
    #app h1{font-size:28px;}
    .desktop-sub{display:block!important;}
    .desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;}
    .desktop-left,.desktop-right{display:flex;flex-direction:column;gap:1rem;}
    .card,.best-card,.cal-wrap,.alert,.hot-banner,.stats-card,.feelings-card{margin-bottom:0!important;}
    .hot-banner .banner-title{font-size:32px;}
    .hot-banner .banner-icon{font-size:56px;}
    .footer{grid-column:1/-1;text-align:center;padding-top:0.5rem;}
    .stats-card,.feelings-card{grid-column:1/-1;}
  }
  .desktop-sub{display:none;text-align:center;font-size:13px;color:var(--text2);margin-bottom:2rem;}
  .header-row{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:1.5rem;margin-top:1rem;}
  h1{font-size:22px;font-weight:500;color:var(--text);text-align:center;}
  .theme-toggle{position:absolute;right:0;width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:var(--card-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background 0.2s;}
  .theme-toggle:hover{background:var(--bg3);}
  .card{background:var(--card-bg);border-radius:16px;padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden;}
  .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;}
  .day-label{font-size:12px;color:var(--text2);margin-bottom:2px;}
  .level-label{font-size:32px;font-weight:500;color:var(--text);line-height:1;}
  .orb-wrap{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .orb{width:28px;height:28px;border-radius:50%;}
  .gauge-track{height:10px;border-radius:6px;background:var(--bg3);overflow:hidden;margin-bottom:6px;}
  .gauge-fill{height:100%;border-radius:6px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);}
  .gauge-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
  .desc{font-size:13px;color:var(--text2);margin:1rem 0 6px;}
  .phase-tip{font-size:12px;color:var(--text3);line-height:1.5;font-style:italic;margin-bottom:1rem;}
  .phase-strip{display:flex;gap:4px;margin-top:0.75rem;}
  .phase-pip{flex:1;height:3px;border-radius:2px;background:var(--bg3);}
  .alert{border-radius:10px;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
  .alert-desire{background:#fff3f022;border:1px solid #f0a08066;}
  .alert-period{background:#f0f4ff22;border:1px solid #a0b4f066;}
  html.dark .alert-desire{background:#3a1f1022;}
  html.dark .alert-period{background:#1a2a4022;}
  .alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1.2s ease-in-out infinite;}
  .alert p{font-size:13px;color:var(--text);line-height:1.5;}
  .hot-banner{border-radius:16px;padding:1.5rem;margin-bottom:1rem;text-align:center;position:relative;overflow:hidden;}
  .hot-banner .banner-icon{font-size:48px;margin-bottom:8px;animation:bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
  .hot-banner .banner-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px;}
  .hot-banner .banner-sub{font-size:14px;color:rgba(255,255,255,0.85);}
  .hot-banner .banner-pulse{position:absolute;inset:0;border-radius:16px;animation:ringPulse 2s ease-out infinite;pointer-events:none;}
  .best-card{background:var(--card-bg);border-radius:16px;border:2px solid #D85A3066;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px #D85A3018;}
  .best-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:12px;text-align:center;text-transform:uppercase;letter-spacing:1.2px;}
  .day-chips{display:flex;gap:8px;}
  .chip{flex:1;border-radius:12px;padding:14px 8px;text-align:center;}
  .chip-dow{font-size:11px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .chip-date{font-size:22px;font-weight:600;margin-bottom:2px;}
  .chip-month{font-size:11px;color:var(--text2);margin-bottom:6px;}
  .chip-label{font-size:12px;font-weight:500;padding:3px 8px;border-radius:20px;display:inline-block;}
  .chip-peak-dot{font-size:10px;margin-top:4px;animation:pulse 1.8s ease-in-out infinite;}
  .cal-wrap{background:var(--card-bg);border-radius:18px;border:1px solid var(--border);padding:1rem;margin-bottom:1rem;}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-nav{background:none;border:0.5px solid var(--border2);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cal-nav:disabled{opacity:0.3;cursor:default;}
  .cal-title-wrap{text-align:center;flex:1;}
  .cal-title{font-size:1rem;font-weight:500;color:var(--text);}
  .cal-estimate{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-dow{font-size:10px;font-weight:600;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:0.04em;padding:4px 0;}
  .cal-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text);position:relative;cursor:pointer;transition:opacity 0.1s;}
  .cal-day:active{opacity:0.6;}
  @media(hover:hover){.cal-day:hover{opacity:0.8;}}
  .cal-day.today{border:2px solid #E8678A;font-weight:600;}
  .cal-day.period{background:#E8D4EE;color:#7B4F8E;}
  .cal-day.follicular{background:#EEF3F8;color:#7A99B8;}
  .cal-day.fertile{background:#FDEAE0;color:#D4845A;}
  .cal-day.ovulation{background:#F7C5D2;color:#E8678A;font-weight:600;}
  .cal-day.luteal{background:#C8E6D4;color:#5FA67A;}
  .cal-day.pms{background:#C8DDF0;color:#5B8DB8;}
  .cal-day.sex{background:#cc3366;color:#fff;font-weight:600;border:none;}
  html.dark .cal-day.sex{background:#cc3366;color:#fff;border:none;}
  .cal-hint{font-size:10px;color:var(--text3);text-align:center;margin-top:10px;margin-bottom:8px;}
  .cal-legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:0.85rem;justify-content:center;}
  .leg-chip{font-size:12px;font-weight:500;padding:5px 11px;border-radius:100px;cursor:pointer;user-select:none;transition:opacity 0.15s;}
  .leg-chip:active{opacity:0.7;}
  .feelings-card{background:var(--card-bg);border-radius:16px;border:1px solid var(--border);padding:1.25rem;margin-top:1rem;}
  .feeling-day{margin-bottom:10px;}
  .feeling-day-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:6px;}
  .feeling-pills{display:flex;flex-wrap:wrap;gap:6px;}
  .feeling-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2);}
  .stats-card{background:var(--card-bg);border-radius:16px;border:1px solid var(--border);padding:1.25rem;margin-top:1rem;}
  .stats-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;text-align:center;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .stat{text-align:center;}
  .stat-val{font-size:20px;font-weight:500;color:var(--text);line-height:1.1;}
  .stat-lbl{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.3;}
  .footer{font-size:11px;color:var(--text3);text-align:center;margin-top:1rem;}
  .footer a{color:var(--text3);cursor:pointer;text-decoration:underline;}
  .loading{text-align:center;padding:3rem 0;color:var(--text2);font-size:14px;}
  .dots{display:flex;justify-content:center;gap:6px;margin-top:8px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);animation:pulse 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeUp 0.2s ease;}
  .modal{background:var(--card-bg);border-radius:20px;padding:1.5rem;width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
  .modal-date{font-size:20px;font-weight:500;color:var(--text);margin-bottom:4px;}
  .modal-sub{font-size:13px;color:var(--text2);margin-bottom:1.25rem;}
  .modal-btns{display:flex;flex-direction:column;gap:8px;}
  .modal-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;width:100%;}
  .modal-btn.period{background:#5576D122;color:#5576D1;border:1px solid #5576D166;}
  .modal-btn.sex{background:#fff0f8;color:#cc6699;border:1px solid #e8a0cc;}
  html.dark .modal-btn.sex{background:#3a1a2a;}
  .modal-btn.cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border);font-weight:400;}
  .modal-saving{font-size:13px;color:var(--text2);padding:0.75rem 0;}
  .modal-success{font-size:13px;color:#1D9E75;padding:0.5rem 0;font-weight:500;}
  .modal-error{font-size:13px;color:#D85A30;padding:0.5rem 0;}
  .pin-overlay{position:fixed;inset:0;background:var(--pin-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:background 0.3s;}
  .pin-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:8px;}
  .pin-sub{font-size:13px;color:var(--text2);margin-bottom:2rem;}
  .pin-dots{display:flex;gap:16px;margin-bottom:2rem;}
  .pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border2);transition:background 0.15s;}
  .pin-dot.filled{background:var(--text);}
  .pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
  .pin-btn{width:72px;height:72px;border-radius:50%;border:0.5px solid var(--border2);background:var(--pin-btn);font-size:22px;font-weight:400;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
  .pin-btn:active{background:var(--bg3);}
  .pin-btn.del{font-size:16px;color:var(--text2);}
  .pin-btn.empty{visibility:hidden;pointer-events:none;}
  .pin-error{font-size:13px;color:#D85A30;margin-top:1rem;height:20px;text-align:center;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounceIn{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4)}70%{box-shadow:0 0 0 14px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
  @keyframes pulseOrb{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  .fadein{animation:fadeUp 0.5s ease both;}
</style>
</head>
<body>

<div id="pin-overlay" class="pin-overlay">
  <div class="pin-title">Michelle Libido Gauge</div>
  <div class="pin-sub">Enter your PIN to continue</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <div class="pin-btn empty"></div>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="app">
  <div class="header-row">
    <h1>Michelle Libido Gauge</h1>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode"></button>
  </div>
  <div id="content">
    <div class="loading">Reading cycle data...
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>
</div>

<script>
const CORRECT_PIN = "1540";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_3BTQZWFreSV48k1hXVLoPs05n_25G9Q5nxYbrlVA4m_1FBg0kwXCCx1__D6IWcLN/exec";
const PERIOD_DATES_FB = ["2025-07-02","2025-07-30","2025-08-23","2025-09-20","2025-10-16","2025-11-10","2025-12-09","2026-01-02","2026-01-28","2026-02-23","2026-03-26"];
const SEX_DATES_FB = ["2026-03-23","2026-04-02"];
const FEELING_EMOJIS = {"Happy":"😊","Energized":"⚡","Calm":"😌","Affectionate":"🥰","Horny":"🔥","Neutral":"😐","Tired":"😴","Foggy / Low focus":"🧠","Stressed":"😮‍💨","Emotional":"😢","Irritable":"😠","Cramping":"🤕","Bloated":"🫠","Headachey":"🤯","Breast Tenderness":"🎀","Nauseous":"🤢"};

// ── Theme ──────────────────────────────────────────────────
function applyTheme(dark){document.documentElement.classList.toggle("dark",dark);document.getElementById("themeToggle").textContent=dark?"☀️":"🌙";}
function toggleTheme(){const d=document.documentElement.classList.contains("dark");localStorage.setItem("theme",d?"light":"dark");applyTheme(!d);}
(function(){const s=localStorage.getItem("theme");applyTheme(s?s==="dark":window.matchMedia("(prefers-color-scheme: dark)").matches);})();

// ── PIN ────────────────────────────────────────────────────
let pinEntry="";
// ── Haptic ─────────────────────────────────────────────────
function haptic(pattern){if(navigator.vibrate)navigator.vibrate(pattern);}

function pinPress(digit){
  if(pinEntry.length>=4)return;
  haptic(10);
  pinEntry+=digit;updatePinDots();
  if(pinEntry.length===4){
    if(pinEntry===CORRECT_PIN){haptic([20,50,20]);sessionStorage.setItem("unlocked","1");document.getElementById("pin-overlay").style.display="none";registerSW();init();}
    else{haptic([50,30,50,30,50]);const dots=document.getElementById("pin-dots");dots.style.animation="shake 0.4s ease";document.getElementById("pin-error").textContent="Incorrect PIN. Try again.";setTimeout(()=>{dots.style.animation="";pinEntry="";updatePinDots();},400);}
  }
}
function pinDel(){haptic(10);pinEntry=pinEntry.slice(0,-1);updatePinDots();document.getElementById("pin-error").textContent="";}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById("d"+i).classList.toggle("filled",i<pinEntry.length);}
document.addEventListener("keydown",e=>{const o=document.getElementById("pin-overlay");if(!o||o.style.display==="none")return;if(e.key>="0"&&e.key<="9")pinPress(e.key);else if(e.key==="Backspace")pinDel();});
if(sessionStorage.getItem("unlocked")==="1"){document.getElementById("pin-overlay").style.display="none";}

// ── Phase tips ─────────────────────────────────────────────
const PHASE_TIPS={"Menstrual":["Focus on comfort and care. Warm gestures, low-key quality time and zero pressure go a long way right now.","This is a rest phase for her. Small acts of kindness like a warm meal, a cozy night in or just being present mean everything.","Keep it simple and low-key. She'll appreciate you taking things off her plate and not pushing for intimacy.","Think nurture over romance. A quiet evening, her favorite comfort food and some extra patience will not go unnoticed."],"Follicular":["She's energetic and open. Great time for dates, new experiences and playful flirtation as she's more receptive to connection.","Her mood is lifting and she's feeling more herself. Plan something fun, be spontaneous and let the good energy flow.","This is a great window for quality time together. She's curious, social and ready to engage so make the most of it.","She's coming alive again after her period. Light flirting, making plans and showing genuine interest will land well."],"Ovulation":["Her confidence and desire are at their peak. Be bold, plan something special and don't hesitate to initiate.","This is the sweet spot. She's feeling attractive and connected so match her energy and make your move.","Her libido is at its highest right now. Be attentive, compliment her genuinely and set the right mood.","Don't overthink it. She's naturally drawn toward connection right now so a little effort goes a very long way."],"Luteal":["She may need more reassurance and emotional support. Acts of service and attentiveness matter more than grand gestures.","Her energy is starting to dip. Check in on her, handle things without being asked and keep the vibe light.","This phase calls for patience and presence. She's more sensitive right now so thoughtful beats flashy.","Focus on being dependable and calm. Small consistent gestures of care will mean more to her than big romantic moves."],"Late Luteal":["PMS territory so patience is key. Reduce stress for her, avoid conflict and focus on comfort over romance.","She may be irritable or withdrawn and that's completely normal. Give her space, be steady and don't take things personally.","This is not the time to push. Be her soft landing place, keep the household calm and save big conversations for later.","Her body and mood are winding down. Show up with empathy, handle the little things quietly and expect nothing in return."]};
function getDailyTip(n){const t=PHASE_TIPS[n]||PHASE_TIPS["Luteal"];return t[Math.floor(Date.now()/86400000)%t.length];}

// ── Phases ─────────────────────────────────────────────────
const PHASES=[
  {name:"Menstrual",  maxPct:0.18,level:1,color:"#B5D4F4",accent:"#378ADD",label:"Low",     desc:"Rest phase — energy and desire are minimal."},
  {name:"Follicular", maxPct:0.46,level:3,color:"#9FE1CB",accent:"#1D9E75",label:"Rising",  desc:"Estrogen rising — mood and interest are climbing."},
  {name:"Ovulation",  maxPct:0.57,level:5,color:"#F0997B",accent:"#D85A30",label:"Peak",    desc:"Ovulation window — libido is at its highest."},
  {name:"Luteal",     maxPct:0.86,level:3,color:"#FAC775",accent:"#BA7517",label:"Moderate",desc:"Post-ovulation — desire starts to ease off."},
  {name:"Late Luteal",maxPct:1.00,level:1,color:"#D3D1C7",accent:"#888780",label:"Low",     desc:"PMS phase — energy and desire are winding down."},
];
function getPhase(day,len){return PHASES.find(p=>day/len<=p.maxPct)||PHASES[4];}
function getPhaseRange(phase,len){const idx=PHASES.indexOf(phase);const prev=idx>0?PHASES[idx-1]:null;const start=prev?Math.floor(prev.maxPct*len)+1:1;const end=Math.min(Math.floor(phase.maxPct*len),len);return"Days "+start+"\u2013"+end;}
function parseISOLocal(str){const[y,m,d]=str.split("-").map(Number);return new Date(y,m-1,d);}
function cycleDay(last,len){return(Math.floor((Date.now()-parseISOLocal(last).getTime())/86400000)%len)+1;}
function avgLen(dates){if(dates.length<2)return 28;const s=dates.map(d=>parseISOLocal(d)).sort((a,b)=>a-b);let t=0;for(let i=1;i<s.length;i++)t+=(s[i]-s[i-1])/86400000;return Math.round(t/(s.length-1));}
function getBestDays(day,len){const out=[];for(let o=0;o<=len&&out.length<3;o++){const d=((day-1+o)%len)+1,pct=d/len;if(pct>0.46&&pct<=0.57){const dt=new Date();dt.setDate(dt.getDate()+o);out.push({daysFrom:o,dt});}}return out;}
function getNextPeriod(day,len){const du=len-day+1,dt=new Date();dt.setDate(dt.getDate()+du);return{daysUntil:du,dateStr:dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})};}
function classifyDay(d,len){if(d<=5)return"period";const p=d/len;if(p<=0.46)return"rising";if(p<=0.57)return"peak";if(p<=0.86)return"neutral";return"low";}

function fetchDates(){
  return new Promise(resolve=>{
    const cb="cb_"+Date.now(), s=document.createElement("script");
    const t=setTimeout(()=>{cleanup();resolve({dates:PERIOD_DATES_FB,sexDates:SEX_DATES_FB,signalDates:[],feelingsMap:{},symptomDates:[]});},8000);
    function cleanup(){delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(t);}
    window[cb]=data=>{
      resolve({
        dates:Array.isArray(data.periodDates)&&data.periodDates.length?data.periodDates:PERIOD_DATES_FB,
        sexDates:Array.isArray(data.sexDates)?data.sexDates:SEX_DATES_FB,
        signalDates:Array.isArray(data.signalDates)?data.signalDates:[],
        feelingsMap:data.feelingsMap||{},
        symptomDates:Array.isArray(data.symptomDates)?data.symptomDates:[]
      });
      cleanup();
    };
    s.onerror=()=>{cleanup();resolve({dates:PERIOD_DATES_FB,sexDates:SEX_DATES_FB,signalDates:[],feelingsMap:{},symptomDates:[]});};
    s.src=SCRIPT_URL+"?action=read&callback="+cb+"&t="+Date.now();
    document.head.appendChild(s);
  });
}

function logDate(type,isoDate){
  return new Promise((resolve,reject)=>{
    const cb="log_"+Date.now(), s=document.createElement("script");
    const t=setTimeout(()=>{cleanup();reject(new Error("Timed out"));},8000);
    function cleanup(){delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(t);}
    window[cb]=data=>{cleanup();if(data.ok||data.success)resolve(data);else reject(new Error(data.message||data.error));};
    s.onerror=()=>{cleanup();reject(new Error("Script error"));};
    const action=type==="period"?"period":"sex";
    s.src=SCRIPT_URL+"?action="+action+"&date="+isoDate+"&callback="+cb;
    document.head.appendChild(s);
  });
}

// ── Service Worker ─────────────────────────────────────────
async function registerSW(){
  if(!("serviceWorker"in navigator)||!("Notification"in window))return;
  try{await navigator.serviceWorker.register("/sw.js");}catch(e){console.log("SW failed:",e);}
}
async function maybeNotify(phase,period,isOverdue,isLastChance,rawDays){
  if(!("Notification"in window))return;
  if(Notification.permission==="default")await Notification.requestPermission();
  if(Notification.permission!=="granted")return;
  let title="",message="";
  if(isOverdue){title="Period log overdue 📋";message="It's been "+rawDays+" days. Did her period start? Open the app to log it.";}
  else if(isLastChance){title="Last chance tonight ⏰";message="Her period starts tomorrow. Tonight is the last opportunity for a while.";}
  else if(phase.name==="Ovulation"){title="Ovulation window 🌸";message="She's in her peak 3-day desire window. Conditions are ideal.";}
  else if(phase.level>=4){title="Tonight's the night 🔥";message="She's at peak desire today. The ovulation window is open.";}
  else if(phase.level===3&&period.daysUntil<=3){title="Period approaching 🌙";message="Her period is expected in "+period.daysUntil+" days. Desire will be dropping soon.";}
  if(!message)return;
  try {
    const reg=await navigator.serviceWorker.ready;
    reg.active.postMessage({type:"SCHEDULE",payload:{title,message,fireAt:Date.now()}});
  } catch(e) {
    new Notification(title,{body:message,icon:"/favicon.svg"});
  }
}

let particleCanvas,particleCtx,particleAnim,monthOffset=0,calState=null;
function stopParticles(){if(particleAnim)cancelAnimationFrame(particleAnim);if(particleCtx&&particleCanvas)particleCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);}
function startParticles(canvas,phase){
  stopParticles();particleCanvas=canvas;particleCtx=canvas.getContext("2d");
  canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  const pts=Array.from({length:phase.level===5?40:20},()=>({x:Math.random()*canvas.width,y:canvas.height+Math.random()*40,r:Math.random()*3+1,speed:Math.random()*0.8+0.3,opacity:Math.random()*0.5+0.2,drift:(Math.random()-0.5)*0.5}));
  function draw(){particleCtx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{particleCtx.beginPath();particleCtx.arc(p.x,p.y,p.r,0,Math.PI*2);particleCtx.fillStyle=phase.accent+Math.round(p.opacity*255).toString(16).padStart(2,"0");particleCtx.fill();p.y-=p.speed;p.x+=p.drift;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}});particleAnim=requestAnimationFrame(draw);}
  draw();
}

// ── Calendar ───────────────────────────────────────────────
function buildCalendar(last,len,sexDates,signalDates,offset){
  const now=new Date(),tgt=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const year=tgt.getFullYear(),month=tgt.getMonth(),isEst=offset>0;
  const mName=tgt.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const firstDay=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const sexSet=new Set(sexDates||[]),signalSet=new Set(signalDates||[]);
  const lastPeriod=parseISOLocal(last),ovDay=Math.round(len*PHASES[2].maxPct);

  function getDayClass(d){
    const dt=new Date(year,month,d);
    const daysSince=Math.floor((dt-lastPeriod)/86400000);
    const cycD=((daysSince%len)+len)%len+1;
    if(cycD<=5)return"period";
    if(cycD>=ovDay-2&&cycD<=ovDay)return"ovulation";
    if(cycD>=ovDay-5&&cycD<ovDay-2)return"fertile";
    const pct=cycD/len;
    if(pct<=PHASES[1].maxPct)return"follicular";
    if(pct<=PHASES[3].maxPct)return"luteal";
    return"pms";
  }

  let cells=["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div class="cal-dow">${d}</div>`).join("");
  for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const iso=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isSex=sexSet.has(iso),isSignal=signalSet.has(iso);
    const pc=getDayClass(d),isToday=offset===0&&d===now.getDate();
    const daysSince=Math.floor((new Date(year,month,d)-lastPeriod)/86400000);
    const cycD=((daysSince%len)+len)%len+1;
    const cls="cal-day"+(isSex?" sex":pc?" "+pc:"")+(isToday?" today":"");
    const tipMap={"period":"Period day "+cycD+" of 5","ovulation":"Peak desire — ovulation window","fertile":"Fertile window — desire rising","follicular":"Follicular phase — energy returning","luteal":"Luteal phase — winding down","pms":"Late luteal / PMS phase"};
    const tip=isSex?"Intimacy recorded":(tipMap[pc]||"");
    // 😊 bottom-left for intimacy, 💜 bottom-right for signal
    const intimacyDot=isSex?`<span style="font-size:11px;position:absolute;bottom:3px;left:50%;transform:translateX(-100%) translateX(-1px);line-height:1">😊</span>`:"";
    const signalDot=isSignal?`<span style="font-size:11px;position:absolute;bottom:3px;left:50%;transform:translateX(1px);line-height:1">💜</span>`:"";
    const singleIntimacy=isSex&&!isSignal?`<span style="font-size:11px;position:absolute;bottom:3px;left:50%;transform:translateX(-50%);line-height:1">😊</span>`:"";
    const singleSignal=isSignal&&!isSex?`<span style="font-size:11px;position:absolute;bottom:3px;left:50%;transform:translateX(-50%);line-height:1">💜</span>`:"";
    const emojiHtml=(isSex&&isSignal)?(intimacyDot+signalDot):isSex?singleIntimacy:isSignal?singleSignal:"";
    cells+=`<div class="${cls}" onclick="showModal('${iso}')" title="${tip}">${d}${emojiHtml}</div>`;
  }
  return`<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)" ${offset===0?"disabled":""}>&#8249;</button>
      <div class="cal-title-wrap">
        <div class="cal-title">${mName}</div>
        ${isEst?`<div class="cal-estimate">estimated projection</div>`:""}
      </div>
      <button class="cal-nav" onclick="changeMonth(1)" ${offset>=6?"disabled":""}>&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-hint">Tap any date to log a period or intimacy</div>
    <div class="cal-legend">
      <span class="leg-chip" onclick="openPhaseInfo('period')"     style="background:#E8D4EE;color:#7B4F8E">🌙 Period</span>
      <span class="leg-chip" onclick="openPhaseInfo('follicular')" style="background:#EEF3F8;color:#7A99B8">🌸 Follicular</span>
      <span class="leg-chip" onclick="openPhaseInfo('fertile')"    style="background:#FDEAE0;color:#D4845A">🌿 Fertile</span>
      <span class="leg-chip" onclick="openPhaseInfo('ovulation')"  style="background:#F7C5D2;color:#E8678A">✨ Ovulation</span>
      <span class="leg-chip" onclick="openPhaseInfo('luteal')"     style="background:#C8E6D4;color:#5FA67A">🍂 Luteal</span>
      <span class="leg-chip" onclick="openPhaseInfo('pms')"        style="background:#C8DDF0;color:#5B8DB8">🌧 PMS</span>
      <span class="leg-chip" style="background:#cc3366;color:#fff;cursor:default">😊 Intimacy</span>
      <span class="leg-chip" style="background:#f5f0ff;color:#7B4F8E;border:1px solid #c9aaee;cursor:default">💜 Signal</span>
    </div>
  </div>`;
}

  const lastSexStr=lastSex?lastSex.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}):null;
  let effLevel=phase.level;if(inCooldown)effLevel=Math.max(1,phase.level-2);
  const onPeriod=phase.name==="Menstrual",todayHot=!onPeriod&&effLevel>=4,todayWarm=!onPeriod&&effLevel===3;
  const recentOnHot=inCooldown&&phase.level>=3&&!onPeriod;
  const rawDays=Math.floor((today-parseISOLocal(last))/86400000)+1;
  const isLC=!onPeriod&&period.daysUntil===1,isOverdue=rawDays>len&&!onPeriod;
  calState={last,len,sexDates:safe,signalDates:safeSignals};

  let banner="";
  if(isOverdue)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#e03535,#b01e1e)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;box-shadow:0 0 8px 4px #e0353399"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;opacity:0.18"></div></div><div class="banner-icon">📋</div><div class="banner-title">Period log overdue</div><div class="banner-sub">It's been ${rawDays} days since her last period. Did she start? Tap the calendar to log it.</div></div>`;
  else if(onPeriod)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#e03535,#b01e1e)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;box-shadow:0 0 8px 4px #e0353399"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;opacity:0.18"></div></div><div class="banner-icon">🌙</div><div class="banner-title">Period day ${day} of 5</div><div class="banner-sub">She's on her period. Not a good time to initiate.</div></div>`;
  else if(recentOnHot)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#2ebc6e,#1a9452)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;box-shadow:0 0 8px 4px #2ebc6e99"></div></div><div class="banner-icon">😏</div><div class="banner-title">Recently active</div><div class="banner-sub">Cycle says high desire but you were active ${daysSince===0?"today":daysSince===1?"yesterday":daysSince+" days ago"}. Give it a bit before attempting to re-engage.</div></div>`;
  else if(todayHot)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#2ebc6e,#1a9452)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;box-shadow:0 0 8px 4px #2ebc6e99"></div></div><div class="banner-icon">🔥</div><div class="banner-title">Tonight's the night</div><div class="banner-sub">She's at peak desire. The ovulation window is open.</div></div>`;
  else if(todayWarm)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#2ebc6e,#1a9452)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;box-shadow:0 0 8px 4px #2ebc6e99"></div></div><div class="banner-icon">⚡</div><div class="banner-title">Good time to initiate</div><div class="banner-sub">Desire is rising. Conditions are favorable.</div></div>`;
  else if(isLC)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#e8c030,#b89010)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;box-shadow:0 0 8px 4px #e8c03099"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;opacity:0.18"></div></div><div class="banner-icon">⏰</div><div class="banner-title">Last chance tonight</div><div class="banner-sub">Her period starts tomorrow. Tonight is the last opportunity for a while.</div></div>`;
  else if(phase.level<=1)banner=`<div class="hot-banner fadein" style="margin-bottom:1rem;background:linear-gradient(135deg,#e8c030,#b89010)"><div class="banner-pulse"></div><div style="position:absolute;top:50%;right:1rem;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.25);border-radius:20px;padding:6px 5px"><div style="width:13px;height:13px;border-radius:50%;background:#e03535;opacity:0.18"></div><div style="width:13px;height:13px;border-radius:50%;background:#e8c030;box-shadow:0 0 8px 4px #e8c03099"></div><div style="width:13px;height:13px;border-radius:50%;background:#2ebc6e;opacity:0.18"></div></div><div class="banner-icon">🌧</div><div class="banner-title">Low desire phase</div><div class="banner-sub">She's in a low-energy window. Not a great time to initiate.</div></div>`;

  let alerts="";
  if(!onPeriod&&!isOverdue){
    if(soonHot&&!isLC)alerts+=`<div class="alert alert-desire fadein"><div class="alert-dot" style="background:#D85A30"></div><p><strong>Heads up</strong> — a high-desire window is ${next.daysFrom===1?"tomorrow":"in "+next.daysFrom+" days"} (${next.dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}).</p></div>`;
    if(periodSoon&&!isLC)alerts+=`<div class="alert alert-period fadein"><div class="alert-dot" style="background:#5576D1"></div><p><strong>Period approaching</strong> — expected ${period.daysUntil===1?"tomorrow":"in "+period.daysUntil+" days"} (${period.dateStr}). Desire will be low.</p></div>`;
    if(!soonHot&&!periodSoon&&phase.level<=1)alerts+=`<div class="alert alert-period fadein"><div class="alert-dot" style="background:#888780"></div><p>Next period expected in <strong>${period.daysUntil} days</strong> (${period.dateStr}).</p></div>`;
  }

  const chips=!onPeriod&&!isOverdue?`<div class="best-card fadein"><div class="best-title">✦ Peak days to initiate ✦</div><div class="day-chips">${best.map(({daysFrom,dt})=>{const ac="#D85A30";return`<div class="chip" style="border:1px solid ${ac}${daysFrom===0?"":"55"};background:${daysFrom===0?ac+"18":"var(--bg3)"}"><div class="chip-dow">${daysFrom===0?"Today":daysFrom===1?"Tomorrow":dt.toLocaleDateString("en-US",{weekday:"long"})}</div><div class="chip-date" style="color:${ac}">${dt.getDate()}</div><div class="chip-month">${dt.toLocaleDateString("en-US",{month:"short"})}</div><div class="chip-label" style="background:${ac}18;color:${ac}">Peak</div><div class="chip-peak-dot" style="color:${ac}">●</div></div>`;}).join("")}</div></div>`:"";

  document.getElementById("content").innerHTML=`<div class="fadein">
    <p class="desktop-sub">Live cycle tracker — updated daily</p>
    ${banner}
    <div class="desktop-grid">
      <div class="desktop-left">
        <div class="card fadein" id="mainCard" style="border:1px solid ${phase.accent}44">
          <canvas id="pCanvas"></canvas>
          <div style="position:relative;z-index:1">
            <div class="row">
              <div><div class="day-label">Day ${day} of ${len} · ${phase.name} (${getPhaseRange(phase,len)})</div><div class="level-label">${phase.label}</div></div>
              <div class="orb-wrap" style="background:${phase.accent}22;border:2px solid ${phase.accent}"><div class="orb" style="background:${phase.accent};${phase.level>=4?"animation:pulseOrb 1.8s ease-in-out infinite":"opacity:0.6"}"></div></div>
            </div>
            <div class="gauge-track"><div class="gauge-fill" id="gaugeFill" style="width:0%;background:linear-gradient(90deg,${phase.color},${phase.accent})"></div></div>
            <div class="gauge-labels"><span>Low</span><span>Rising</span><span>Peak</span></div>
            <p class="desc">${phase.desc}</p>
            <p class="phase-tip">${getDailyTip(phase.name)}</p>
            <div class="phase-strip">${PHASES.map(p=>`<div class="phase-pip" style="background:${p.name===phase.name?phase.accent:"var(--bg3)"};${p.name===phase.name?"animation:pulse 2s ease-in-out infinite":""}"></div>`).join("")}</div>
          </div>
        </div>
        ${alerts}${buildLastIntimacy(lastSexStr,showSmiley,daysSince)}${chips}
      </div>
      <div class="desktop-right"><div id="calContainer">${buildCalendar(last,len,safe,safeSignals,0)}</div></div>
    </div>
    <div class="footer">Avg cycle: ${len} days · <a onclick="init()">Refresh</a></div>
    ${buildFeelingsCard(feelingsMap||{})}
    ${buildStats(dates,safe,len)}
  </div>`;

  setTimeout(()=>{
    const f=document.getElementById("gaugeFill");if(f)f.style.width=Math.max(8,((phase.level-1)/4)*100)+"%";
    if(phase.level>=3){const c=document.getElementById("pCanvas");if(c)startParticles(c,phase);}
  },100);
  maybeNotify(phase,period,isOverdue,isLC,rawDays);
}

// ── Init ───────────────────────────────────────────────────
async function init(){
  stopParticles();
  document.getElementById("content").innerHTML=`<div class="loading">Reading cycle data...<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  const{dates,sexDates,feelingsMap,signalDates}=await fetchDates();
  render(dates,sexDates,feelingsMap,signalDates||[]);
}

if(sessionStorage.getItem("unlocked")==="1"){registerSW();init();}
</script>
</body>
</html>
